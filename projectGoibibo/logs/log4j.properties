#root logger
log4j.rootLogger = trace, console, file
 
#appender
log4j.appender.console = org.apache.log4j.ConsoleAppender
log4j.appender.file = org.apache.log4j.RollingFileAppender
log4j.appender.file.File = logs/${logFile}.log

#layout
og4j.appender.console.DatePattern='.'yyyy-MM-dd-HH-mm'.log'
log4j.appender.console.layout = org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=[%p] %d %c %M - %m%n
og4j.appender.file.DatePattern='.'yyyy-MM-dd-HH-mm'.log'
log4j.appender.file.layout = org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=[%p] %d %c %M - %m%n
